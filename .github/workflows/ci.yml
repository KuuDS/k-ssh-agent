name: CI

on:
  push:
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: cargo build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: cargo test

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  audit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: cargo audit

  build-macos-aarch64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-aarch64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-aarch64-cargo-
      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/k-ssh-agent dist/k-ssh-agent-macos-aarch64
          chmod +x dist/k-ssh-agent-macos-aarch64
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: k-ssh-agent-macos-aarch64
          path: dist/k-ssh-agent-macos-aarch64
          retention-days: 30

  nightly:
    name: Nightly Release
    runs-on: ubuntu-latest
    needs: [build, test, lint, audit, build-macos-aarch64]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download macOS aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: k-ssh-agent-macos-aarch64
          path: dist
      - name: Create release archive
        run: |
          cd dist
          chmod +x k-ssh-agent-macos-aarch64
          tar czf k-ssh-agent-macos-aarch64.tar.gz k-ssh-agent-macos-aarch64
          sha256sum k-ssh-agent-macos-aarch64.tar.gz > k-ssh-agent-macos-aarch64.sha256
      - name: Delete old nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes || true
          gh api --method DELETE /repos/${{ github.repository }}/git/refs/tags/nightly || true
      - name: Create nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create nightly \
            --title "Nightly Build ($(date +%Y-%m-%d))" \
            --notes "Latest build from main branch ($(git rev-parse --short HEAD))" \
            --prerelease \
            dist/k-ssh-agent-macos-aarch64.tar.gz \
            dist/k-ssh-agent-macos-aarch64.sha256

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, test, lint, audit, build-macos-aarch64]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download macOS aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: k-ssh-agent-macos-aarch64
          path: dist
      - name: Create release archive
        run: |
          cd dist
          chmod +x k-ssh-agent-macos-aarch64
          tar czf k-ssh-agent-macos-aarch64.tar.gz k-ssh-agent-macos-aarch64
          sha256sum k-ssh-agent-macos-aarch64.tar.gz > k-ssh-agent-macos-aarch64.sha256
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/k-ssh-agent-macos-aarch64.tar.gz
            dist/k-ssh-agent-macos-aarch64.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
